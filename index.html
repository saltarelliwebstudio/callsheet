<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>📞 Today's Calls — Fri Jun 26</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--line:#30363d;--txt:#e6edf3;--mut:#8b949e;
        --hot:#f85149;--money:#d29922;--warm:#3fb950;--first:#a371f7;--call:#238636;--done:#1f6feb}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:0 0 40px}
  header{position:sticky;top:0;background:rgba(13,17,23,.95);backdrop-filter:blur(8px);
         padding:14px 16px calc(10px + env(safe-area-inset-top)) 16px;border-bottom:1px solid var(--line);z-index:5}
  h1{margin:0 0 8px;font-size:19px}
  .bar{height:8px;background:var(--card);border-radius:6px;overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:var(--warm);transition:width .25s}
  .count{font-size:13px;color:var(--mut);margin-top:6px;display:flex;justify-content:space-between}
  .reset{color:var(--mut);background:none;border:1px solid var(--line);border-radius:6px;padding:3px 9px;font-size:12px}
  .sec{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin:22px 16px 8px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:12px;margin:10px 14px;padding:14px}
  .card.hot{border-left-color:var(--hot)} .card.money{border-left-color:var(--money)}
  .card.warm{border-left-color:var(--warm)} .card.first{border-left-color:var(--first)}
  .card.done{opacity:.45}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#21262d;color:var(--mut);margin-bottom:6px}
  .name{font-size:18px;font-weight:700;margin:2px 0}
  .what{font-size:14px;color:var(--mut);margin:4px 0 12px}
  .ph{font-variant-numeric:tabular-nums;color:var(--txt);font-size:14px}
  .row{display:flex;gap:10px;margin-top:10px}
  a.call,button.mark{flex:1;text-align:center;border:none;border-radius:10px;padding:13px 0;font-size:15px;font-weight:700;text-decoration:none}
  a.call{background:var(--call);color:#fff}
  button.mark{background:#21262d;color:var(--txt);border:1px solid var(--line)}
  .card.done button.mark{background:var(--done);color:#fff;border-color:var(--done)}
  footer{text-align:center;color:var(--mut);font-size:12px;margin-top:26px}
</style>
</head>
<body>
<header>
  <h1>📞 Today's Calls — Fri Jun 26</h1>
  <div class="bar"><i id="fill"></i></div>
  <div class="count"><span id="cnt">0 / 0 done</span><button class="reset" onclick="resetAll()">reset</button></div>
</header>
<main id="list"></main>
<footer>Tap Call to dial · Mark done as you go · saves on your phone</footer>
<script>
const DAY="2026-06-26";
const LEADS=[
 {grp:"first",tag:"🍕 DO FIRST",name:"Mulberry's (pizza order)",phone:"9058348407",what:"Lock the order + pickup time — small kitchen, 10 people. Open 4–9pm."},
 {grp:"hot",tag:"🔴 HOT",name:"Tim — Grind Tech",phone:"2892379624",what:"Deposit's IN. Confirm + ask for 5–10 before/after photos. Draft early next week."},
 {grp:"hot",tag:"🔴 HOT",name:"Mark — Windows & Doors",phone:"9053273971",what:"Chase the $650 Phase 1 (overdue). Send it over and you deliver the draft right after."},
 {grp:"hot",tag:"🔴 HOT",name:"Cesar — Royal Landworks",phone:"3658333330",what:"Confirm sign-back + deposit, then start the build."},
 {grp:"hot",tag:"🔴 HOT",name:"Scott — HomeBase Renovations",phone:"5192172290",what:"Callback was due yesterday. Build rapport, he doesn't fully trust yet. Free review QR."},
 {grp:"hot",tag:"🔴 HOT",name:"Chris Currie — Mountain Air",phone:"7054413985",what:"Jun 21 demo, very interested, never closed. Close it."},
 {grp:"money",tag:"💰 COLLECT",name:"Micheal Hardy — NAPA",phone:"9056586032",what:"Monthly subscription collection."},
 {grp:"money",tag:"💰 CLIENT",name:"Joe — Delta Energy",phone:"2899320732",what:"Already paid. Schedule his build (send wireframes + Anthony feedback)."},
 {grp:"warm",tag:"🌱 WARM",name:"Simran Pahal — Pahal Construction",phone:"9058673547",what:"Interested, not dead. Quick re-touch."},
 {grp:"warm",tag:"🌱 WARM",name:"Candace — Fitzgerald Electrical",phone:"5197559008",what:"Used the QR, hasn't built the site yet. Nudge."},
 {grp:"warm",tag:"🌱 WARM",name:"Rob — Snippe Electric",phone:"9052463679",what:"Voice-agent pitch on the phone (misses a lot of calls)."},
 {grp:"warm",tag:"🌱 WARM",name:"John F — Spinton Roofing",phone:"9055753686",what:"Voice-agent pitch (every missed call is a roof lost)."},
 {grp:"warm",tag:"🌱 WARM",name:"Marisa Klemm — Brand Name Shoes",phone:"9056511325",what:"Keep in the mix, quick touch."},
 {grp:"warm",tag:"🌱 WARM",name:"Ken — Furniture Appliance",phone:"4166023815",what:"No-show before — chase a reschedule."}
];
const SECT={first:"Do first",hot:"🔴 Hot — money",money:"💰 Collect / client",warm:"🌱 Warm — if time"};
const key="calls_"+DAY;
let state=JSON.parse(localStorage.getItem(key)||"{}");
function id(l){return l.name+"|"+l.phone}
function fmt(p){return "("+p.slice(0,3)+") "+p.slice(3,6)+"-"+p.slice(6)}
function render(){
 const list=document.getElementById("list");list.innerHTML="";
 let order=["first","hot","money","warm"];
 order.forEach(g=>{
   const items=LEADS.filter(l=>l.grp===g);if(!items.length)return;
   const h=document.createElement("div");h.className="sec";h.textContent=SECT[g];list.appendChild(h);
   items.forEach(l=>{
     const done=!!state[id(l)];
     const c=document.createElement("div");c.className="card "+l.grp+(done?" done":"");
     c.innerHTML=`<span class="tag">${l.tag}</span>
       <div class="name">${l.name}</div>
       <div class="ph">${fmt(l.phone)}</div>
       <div class="what">${l.what}</div>
       <div class="row">
         <a class="call" href="tel:+1${l.phone}">📞 Call</a>
         <button class="mark">${done?"✓ Done":"Mark done"}</button>
       </div>`;
     c.querySelector(".mark").onclick=()=>toggle(l);
     list.appendChild(c);
   });
 });
 const total=LEADS.length,d=LEADS.filter(l=>state[id(l)]).length;
 document.getElementById("cnt").textContent=d+" / "+total+" done";
 document.getElementById("fill").style.width=(total?d/total*100:0)+"%";
}
function toggle(l){
 const k=id(l);state[k]=!state[k];localStorage.setItem(key,JSON.stringify(state));
 try{fetch("https://qykcisuljovprfftomry.supabase.co/functions/v1/callsheet-mark",{
   method:"POST",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({day:DAY,niche:l.grp,biz:l.name,phone:l.phone,fact:l.what,called:!!state[k]})})}catch(e){}
 render();
}
function resetAll(){if(confirm("Reset all marks for today?")){state={};localStorage.setItem(key,"{}");render()}}
render();
</script>
</body>
</html>
