.card.done{opacity:.38}
.card.done .biz{text-decoration:line-through}
.ntag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:6px;margin-bottom:8px}

.biz{font-size:17px;font-weight:700;margin:0 0 3px}
.loc{font-size:13px;color:#94a3b8;margin-bottom:8px}
.fact{font-size:13px;color:#cbd5e1;background:#0f172a;padding:8px 10px;border-radius:8px;margin-bottom:12px;border-left:3px solid #3b82f6}
.actions{display:flex;gap:8px}
.btn{flex:1;text-align:center;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;text-decoration:none;display:block}
.call{background:#22c55e;color:#04240f}
.mark{background:#334155;color:#e2e8f0}
.mark.on{background:#16a34a;color:#fff}
.empty{text-align:center;color:#64748b;padding:50px 20px;font-size:14px}
.reset{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #1e293b;padding:12px 16px;text-align:center}
.reset button{background:none;border:1px solid #334155;color:#64748b;padding:8px 16px;border-radius:8px;font-size:13px}
</style>
